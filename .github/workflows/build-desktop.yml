name: Build Desktop (Electron)

# Builds PoH-Miner for Linux, macOS, and Windows on GitHub runners, renames the
# outputs to STABLE (version-less) asset names, and attaches them to the GitHub
# Release for the pushed tag. The landing page links to
#   https://github.com/Proof-of-Human-Network/poh-miner/releases/latest/download/<stable-name>
# which always resolves to the newest release — so no manual uploads, ever.
#
# Trigger: push a version tag (v0.4.6, …) or run manually from the Actions tab.
# Builds are UNSIGNED (no Apple/Windows certs in CI). macOS first launch:
#   right-click → Open, or  xattr -dr com.apple.quarantine /Applications/PoH-Miner.app

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

permissions:
  contents: write            # release step uploads assets

jobs:
  build:
    strategy:
      fail-fast: false        # one platform failing shouldn't kill the others
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-14       # Apple Silicon runner — builds arm64 + x64 dmg
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Repo gitignores lockfiles → no `cache: npm`, and `npm install` (not `npm ci`).
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (${{ matrix.platform }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # no signing cert in CI → unsigned
          # No GH_TOKEN here on purpose: it would make electron-builder auto-publish
          # versioned names + latest-*.yml (auto-update metadata the app doesn't use).
          # The "Attach to GitHub Release" step below owns the release, stable names only.
        run: npm run build:electron:${{ matrix.platform }}

      # electron-builder writes versioned names into dist/electron (build.directories.output).
      # Copy them to the stable landing names so the release URLs never change.
      - name: Stage release assets (stable names)
        shell: bash
        run: |
          set -e
          mkdir -p out
          shopt -s nullglob
          case "${{ matrix.platform }}" in
            linux)
              for f in dist/electron/*.AppImage; do
                case "$f" in
                  *arm64*) cp "$f" out/poh-miner-linux-arm64.AppImage ;;
                  *)       cp "$f" out/poh-miner-linux-x64.AppImage ;;
                esac
              done ;;
            win)
              # NSIS installer is the "... Setup ....exe"; portable is the plain one.
              for f in dist/electron/*Setup*.exe;                do cp "$f" out/poh-miner-windows-x64.exe ; done
              for f in dist/electron/*.exe; do case "$f" in *Setup*) ;; *) cp "$f" out/poh-miner-windows-x64-portable.exe ;; esac; done ;;
            mac)
              # Landing naming: Apple Silicon (arm64) = "amd", Intel (x64) = "intel".
              for f in dist/electron/*.dmg; do
                case "$f" in
                  *arm64*) cp "$f" out/poh-miner-macos-amd.dmg ;;
                  *)       cp "$f" out/poh-miner-macos-intel.dmg ;;
                esac
              done ;;
          esac
          ls -lh out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poh-miner-${{ matrix.platform }}
          path: out/*
          if-no-files-found: error
          retention-days: 14

      # On a version tag, attach the stable-named files to the Release (all three
      # matrix jobs append to the same release for the tag).
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: true
