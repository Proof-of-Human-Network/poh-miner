<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoH Miner — Upgrade Guide</title>
  <meta name="description" content="How to upgrade an existing PoH Miner install — QVAC in-process AI, hardware-graded model picker, backups, and troubleshooting.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Iceland&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../poh-miner.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
  <link rel="shortcut icon" href="../favicon.ico">
  <style>
    body { font-family: 'Iceland', sans-serif; background: #000; color: #fff; line-height: 1.55; }
    .neon { color: #22c55e; }
    /* Rendered markdown */
    #content h1 { font-size: 2.6rem; margin: 1.2rem 0 1rem; color: #22c55e; }
    #content h2 { font-size: 2rem;  margin: 2.2rem 0 0.8rem; border-bottom: 1px solid #1f1f1f; padding-bottom: 0.3rem; }
    #content h3 { font-size: 1.5rem; margin: 1.6rem 0 0.6rem; color: #22c55e; }
    #content p, #content li { font-size: 1.15rem; color: #d4d4d4; }
    #content ul, #content ol { margin: 0.6rem 0 1rem 1.4rem; list-style: disc; }
    #content a { color: #22c55e; text-decoration: underline; }
    #content code {
      background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 4px;
      padding: 0.08rem 0.35rem; font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.85rem; color: #a3e635;
    }
    #content pre {
      background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 6px;
      padding: 1rem 1.25rem; overflow-x: auto; margin: 0.8rem 0 1.2rem;
    }
    #content pre code { border: none; background: transparent; padding: 0; color: #a3a3a3; font-size: 0.85rem; }
    #content table { width: 100%; border-collapse: collapse; margin: 0.8rem 0 1.4rem; font-size: 1.02rem; }
    #content th, #content td { border: 1px solid #1f1f1f; padding: 0.5rem 0.8rem; text-align: left; color: #d4d4d4; }
    #content th { background: #0a0a0a; color: #22c55e; }
    #content hr { border-color: #1f1f1f; margin: 2rem 0; }
    #content blockquote { border-left: 3px solid #22c55e; padding-left: 1rem; color: #a3a3a3; margin: 0.8rem 0; }
  </style>
</head>
<body class="bg-black text-white">

  <nav class="border-b border-white/10 bg-black/80 backdrop-blur-xl fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-8 h-16 sm:h-20 flex items-center justify-between">
      <a href="../" class="flex items-center gap-3 hover:opacity-80 transition">
        <img src="../poh-miner.svg" alt="PoH" width="36" height="36" class="sm:w-12 sm:h-12" />
        <span class="text-[28px] sm:text-[40px] leading-none">Upgrade Guide</span>
      </a>
      <div class="flex items-center gap-6 text-[18px] sm:text-[20px]">
        <a href="./" class="text-white/60 hover:text-white transition">API Docs</a>
        <a href="../" class="text-white/60 hover:text-white transition">← Landing</a>
        <a href="https://github.com/Proof-of-Human-Network/poh-miner" target="_blank" class="text-white/60 hover:text-white transition">GitHub</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 sm:px-8 pt-28 sm:pt-32 pb-24">
    <article id="content" class="min-h-[50vh]">Loading…</article>
  </main>

  <script>
    fetch('upgrade-guide.md')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
      .catch(() => { document.getElementById('content').textContent = 'Could not load the guide. See GitHub: https://github.com/Proof-of-Human-Network/poh-miner'; });
  </script>
</body>
</html>
