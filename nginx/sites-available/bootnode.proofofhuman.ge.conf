# Bootnode for PoH Miner Network
# Domain: bootnode.proofofhuman.ge
# Backend: 217.60.38.159 (runs src/bootnode.js on port 8080)

# Include reusable snippets
include /etc/nginx/snippets/rate-limiting.conf;
include /etc/nginx/snippets/ssl-params.conf;
include /etc/nginx/snippets/security-headers.conf;

server {
    listen 80;
    listen [::]:80;
    server_name bootnode.proofofhuman.ge;

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bootnode.proofofhuman.ge;

    # SSL certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/bootnode.proofofhuman.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bootnode.proofofhuman.ge/privkey.pem;

    # Reverse proxy to the bootnode (running on port 8080)
    location / {
        # Rate limiting for public bootnode (adjust as needed)
        limit_req zone=bootnode_limit burst=30 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important for long-polling / large block sync responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }
}