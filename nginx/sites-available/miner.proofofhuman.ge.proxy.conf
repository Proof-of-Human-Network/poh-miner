# Alternative: Full proxy version for miner.proofofhuman.ge
# Use this if you want to proxy *everything* to the miner node (port 3456)
# instead of serving the static landing page.

include /etc/nginx/snippets/ssl-params.conf;
include /etc/nginx/snippets/security-headers.conf;

server {
    listen 80;
    listen [::]:80;
    server_name miner.proofofhuman.ge;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name miner.proofofhuman.ge;

    ssl_certificate     /etc/letsencrypt/live/miner.proofofhuman.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miner.proofofhuman.ge/privkey.pem;

    # Proxy everything to the miner node
    location / {
        proxy_pass http://127.0.0.1:3456;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Strip CORS headers from upstream so nginx doesn't duplicate them
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    }

    location /health {
        proxy_pass http://127.0.0.1:3456/health;
        access_log off;
    }
}